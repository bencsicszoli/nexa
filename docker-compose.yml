services:
  # --- Infrastruktúra (a 3. kártyától használja a backend) ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nexa
      POSTGRES_USER: nexa
      POSTGRES_PASSWORD: nexa
    ports:
      # Host-oldalon 5433, hogy ne ütközzön egy gépen futó másik Postgresszel (5432).
      # A backend a konténerhálózaton belül továbbra is a postgres:5432-t használja.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexa"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Alkalmazás ---
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-me-please-32bytes-min!!}
      POSTGRES_USER: ${POSTGRES_USER:-nexa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexa}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      # konténerből a backend service nevén érjük el
      VITE_API_PROXY_TARGET: http://backend:8080
    depends_on:
      - backend

volumes:
  pgdata:
