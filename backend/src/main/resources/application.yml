spring:
  application:
    name: nexa-backend

  # Helyi fejlesztés: a Nexa Postgres Dockerből, 5433-as host porton fut
  # (a gépen lévő másik Postgres foglalja az 5432-t). Lásd README / docker-compose.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/nexa}
    username: ${DB_USER:nexa}
    password: ${DB_PASSWORD:nexa}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: 8080

nexa:
  cors:
    allowed-origins: "http://localhost:5173"
  jwt:
    # Fejlesztői alapérték; éles/közös környezetben KÖTELEZŐ a JWT_SECRET env (>= 32 bájt).
    secret: ${JWT_SECRET:dev-only-secret-change-me-please-32bytes-min!!}
    access-token-ttl-seconds: 900        # 15 perc
    refresh-token-ttl-seconds: 604800    # 7 nap
  security:
    # A 2FA TOTP-titok DB-titkosításának kulcsa (#17). Fejlesztői alapérték; élesben KÖTELEZŐ
    # a TOTP_ENCRYPTION_KEY env beállítása (bármilyen hosszú jelmondat; SHA-256 képzi a kulcsot).
    totp-encryption-key: ${TOTP_ENCRYPTION_KEY:dev-only-totp-encryption-key-change-in-prod}
  storage:
    # local (alap): lemezre ment, /api/media-ról szolgál ki — nincs külső infra.
    # s3 (#6): valódi R2/S3 presigned URL ugyanezzel a frontend-szerződéssel.
    provider: ${STORAGE_PROVIDER:local}
    max-upload-bytes: 5242880            # 5 MB felső korlát képhez
    max-video-bytes: 52428800            # 50 MB felső korlát videóhoz
    local:
      dir: ${STORAGE_LOCAL_DIR:data/media}
      # A feltöltési tokenek aláírókulcsa; alapból a JWT-titok.
      secret: ${nexa.jwt.secret}
      upload-ttl-seconds: 300            # az aláírt feltöltési link 5 percig él
  webrtc:
    # ICE-szerverek a videohíváshoz (#13). STUN: nyilvános Google-szerver alapból (cím-felfedezés,
    # a legtöbb hálózaton elég). TURN (relé szigorú NAT/tűzfal mögött): coturn env-ből, ha kell —
    # üresen hagyva nincs TURN. A frontend a GET /api/calls/ice-servers-ből kapja ezt a listát.
    stun-urls: ${WEBRTC_STUN_URLS:stun:stun.l.google.com:19302,stun:stun1.l.google.com:19302}
    turn-url: ${WEBRTC_TURN_URL:}
    turn-username: ${WEBRTC_TURN_USERNAME:}
    turn-credential: ${WEBRTC_TURN_CREDENTIAL:}
  payment:
    # Fejlesztői/demo előfizetés-vezérlők (#15). Bekapcsolva (PAYMENT_DEV_CONTROLS=true) elérhető a
    # /api/dev/subscription végpont, amivel élő Paddle nélkül állítható az előfizetés-állapot a paywall
    # demózásához. Élesben KÖTELEZŐEN false (a bean ilyenkor létre sem jön → a route 404).
    dev-controls: ${PAYMENT_DEV_CONTROLS:false}
    # Paddle előfizetés (#14). Sandboxban fejlesztünk/tesztelünk — éles: PADDLE_ENV=production
    # és a production-api.paddle.com. A kártyaadat sosem érinti a szervert (Paddle hosztolt checkout).
    paddle:
      environment: ${PADDLE_ENV:sandbox}              # sandbox | production
      api-base-url: ${PADDLE_API_URL:https://sandbox-api.paddle.com}
      api-key: ${PADDLE_API_KEY:}                     # szerver-oldali Bearer kulcs (portál, lekérdezés)
      client-token: ${PADDLE_CLIENT_TOKEN:}           # publikus kliens-token a frontend checkouthoz
      webhook-secret: ${PADDLE_WEBHOOK_SECRET:}        # pdl_ntfset_... — webhook aláírás-ellenőrzéshez
      price-monthly: ${PADDLE_PRICE_MONTHLY:}          # havi csomag price ID (pri_...)
      price-annual: ${PADDLE_PRICE_ANNUAL:}            # éves csomag price ID (pri_...)
      trial-days: ${PADDLE_TRIAL_DAYS:14}

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
# Konténeres teljes stack (docker compose): a Postgres a "postgres" service-en,
# belső 5432-es porton érhető el.
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/nexa
    username: ${POSTGRES_USER:nexa}
    password: ${POSTGRES_PASSWORD:nexa}

nexa:
  cors:
    allowed-origins: ${NEXA_CORS_ALLOWED_ORIGINS:http://localhost:5173}
