spring:
  application:
    name: nexa-backend

  # Helyi fejlesztés: a Nexa Postgres Dockerből, 5433-as host porton fut
  # (a gépen lévő másik Postgres foglalja az 5432-t). Lásd README / docker-compose.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/nexa}
    username: ${DB_USER:nexa}
    password: ${DB_PASSWORD:nexa}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: 8080

nexa:
  cors:
    allowed-origins: "http://localhost:5173"
  jwt:
    # Fejlesztői alapérték; éles/közös környezetben KÖTELEZŐ a JWT_SECRET env (>= 32 bájt).
    secret: ${JWT_SECRET:dev-only-secret-change-me-please-32bytes-min!!}
    access-token-ttl-seconds: 900        # 15 perc
    refresh-token-ttl-seconds: 604800    # 7 nap
  storage:
    # local (alap): lemezre ment, /api/media-ról szolgál ki — nincs külső infra.
    # s3 (#6): valódi R2/S3 presigned URL ugyanezzel a frontend-szerződéssel.
    provider: ${STORAGE_PROVIDER:local}
    max-upload-bytes: 5242880            # 5 MB felső korlát képhez
    max-video-bytes: 52428800            # 50 MB felső korlát videóhoz
    local:
      dir: ${STORAGE_LOCAL_DIR:data/media}
      # A feltöltési tokenek aláírókulcsa; alapból a JWT-titok.
      secret: ${nexa.jwt.secret}
      upload-ttl-seconds: 300            # az aláírt feltöltési link 5 percig él

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
# Konténeres teljes stack (docker compose): a Postgres a "postgres" service-en,
# belső 5432-es porton érhető el.
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/nexa
    username: ${POSTGRES_USER:nexa}
    password: ${POSTGRES_PASSWORD:nexa}

nexa:
  cors:
    allowed-origins: ${NEXA_CORS_ALLOWED_ORIGINS:http://localhost:5173}
