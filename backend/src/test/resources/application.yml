# Tesztprofil: H2 in-memory adatbázis, hogy ne kelljen futó Postgres.
spring:
  datasource:
    url: jdbc:h2:mem:nexa;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

nexa:
  cors:
    allowed-origins: "http://localhost:5173"
  jwt:
    secret: "test-secret-test-secret-test-secret-32b!"
    access-token-ttl-seconds: 900
    refresh-token-ttl-seconds: 604800
