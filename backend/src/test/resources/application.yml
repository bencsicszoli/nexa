# Tesztprofil: H2 in-memory adatbázis, hogy ne kelljen futó Postgres.
spring:
  datasource:
    url: jdbc:h2:mem:nexa;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

nexa:
  cors:
    allowed-origins: "http://localhost:5173"
  jwt:
    secret: "test-secret-test-secret-test-secret-32b!"
    access-token-ttl-seconds: 900
    refresh-token-ttl-seconds: 604800
  storage:
    provider: local
    max-upload-bytes: 5242880
    local:
      dir: ${java.io.tmpdir}/nexa-test-media
      secret: ${nexa.jwt.secret}
      upload-ttl-seconds: 300
  payment:
    # A gating-teszt (#15) ezzel vezérli az előfizetés-állapotot a /api/dev/subscription-ön át.
    dev-controls: true
    paddle:
      environment: sandbox
      api-base-url: https://sandbox-api.paddle.com
      api-key: "test-api-key"
      client-token: "test_client_token"
      webhook-secret: "pdl_ntfset_test_secret_for_webhook_signing"
      price-monthly: "pri_monthly_test"
      price-annual: "pri_annual_test"
      trial-days: 14
